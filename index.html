<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QandaCX Weekly Roulette</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --border:    #2d2d4e;
      --muted:     #6b7280;
      --text:      #e5e7eb;
      --c-biz:     #a78bfa;
      --c-ca:      #38bdf8;
      --c-cx:      #34d399;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Screen system ─────────────────────────── */
    .screen { display: none; width: 100%; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    /* ══════════════════════════════════════════════
       LOGIN SCREEN
    ══════════════════════════════════════════════ */
    #screen-login {
      justify-content: center;
      padding: 32px 16px;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .login-logo .icon {
      font-size: 3rem;
      line-height: 1;
    }

    .login-logo h1 {
      font-size: 1.35rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.35;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-logo .sub {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form label {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-input:focus { border-color: #a78bfa; }
    .login-input.valid { border-color: #34d399; }
    .login-input.invalid { border-color: #f87171; }

    .login-hint {
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 18px;
      transition: color 0.2s;
    }

    .login-hint.ok  { color: #34d399; }
    .login-hint.err { color: #f87171; }

    .start-btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .start-btn:hover:not(:disabled) { opacity: 0.9; transform: scale(1.02); }

    /* ══════════════════════════════════════════════
       SHARED TOPBAR
    ══════════════════════════════════════════════ */
    .topbar {
      width: 100%;
      max-width: 920px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 16px 0;
    }

    .topbar-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .topbar-user {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .icon-btn:hover { border-color: #a78bfa; color: #a78bfa; background: #1a1040; }

    /* ══════════════════════════════════════════════
       MAIN ROULETTE SCREEN
    ══════════════════════════════════════════════ */
    #screen-main {
      padding-bottom: 48px;
    }

    .main-header {
      text-align: center;
      margin: 24px 0 32px;
    }

    .main-header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .main-header p { font-size: 0.8rem; color: var(--muted); }

    .teams {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 920px;
      padding: 0 16px;
      margin-bottom: 32px;
    }

    .team-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 20px;
      flex: 1 1 240px;
      min-width: 220px;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .team-card[data-team="BizOps"] { --accent: var(--c-biz); }
    .team-card[data-team="CA"]     { --accent: var(--c-ca);  }
    .team-card[data-team="CX"]     { --accent: var(--c-cx);  }

    .team-card.spinning { border-color: var(--accent); }
    .team-card.done     { border-color: var(--accent); box-shadow: 0 0 22px -4px var(--accent); }

    .team-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    .slot-window {
      width: 100%;
      height: 52px;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slot-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .slot-text.result {
      color: var(--accent);
      font-size: 1.2rem;
    }

    .member-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .member-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #12122a;
      border-radius: 8px;
      padding: 7px 10px;
      border: 1px solid transparent;
      transition: border-color 0.3s, background 0.3s;
    }

    .member-item.highlighted { background: #1e1040; border-color: var(--accent); }
    .member-item.is-me::before { content: "★ "; font-size: 0.7rem; color: var(--accent); }

    .member-name-text { font-size: 0.88rem; font-weight: 500; color: var(--text); }

    .pick-badge {
      font-size: 0.68rem;
      background: var(--border);
      color: var(--muted);
      padding: 2px 7px;
      border-radius: 999px;
      min-width: 30px;
      text-align: center;
    }

    .member-item.highlighted .pick-badge { background: var(--accent); color: #fff; }

    .spin-btn {
      padding: 16px 64px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 28px rgba(167,139,250,0.35);
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
    }

    .spin-btn:hover:not(:disabled) { transform: scale(1.04); box-shadow: 0 6px 36px rgba(167,139,250,0.5); }
    .spin-btn:active:not(:disabled) { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* History */
    .history-panel {
      margin-top: 28px;
      width: 100%;
      max-width: 920px;
      padding: 0 16px;
    }

    .history-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
    }

    .panel-title {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .result-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 240px;
      overflow-y: auto;
    }

    .result-list li {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 7px;
    }

    .result-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .round-label { color: #4b5563; font-size: 0.72rem; min-width: 36px; }

    .result-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #12122a;
      border-radius: 6px;
      padding: 3px 9px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .history-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .ghost-btn {
      font-size: 0.73rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .ghost-btn:hover { border-color: #ef4444; color: #ef4444; }

    /* ══════════════════════════════════════════════
       SETTINGS SCREEN
    ══════════════════════════════════════════════ */
    #screen-settings {
      padding-bottom: 48px;
    }

    .settings-header {
      text-align: center;
      margin: 24px 0 28px;
    }

    .settings-header h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .settings-header p { font-size: 0.8rem; color: var(--muted); }

    .settings-body {
      width: 100%;
      max-width: 640px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
    }

    .settings-card-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .settings-card[data-team="BizOps"] .settings-card-title { color: var(--c-biz); }
    .settings-card[data-team="CA"]     .settings-card-title { color: var(--c-ca);  }
    .settings-card[data-team="CX"]     .settings-card-title { color: var(--c-cx);  }

    .settings-member-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .settings-member-row:last-child { border-bottom: none; }

    .settings-member-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .settings-member-input:focus { border-color: #a78bfa; }

    .pick-info {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .reset-picks-btn {
      width: 100%;
      padding: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      background: none;
      border: 1px solid #ef4444;
      color: #ef4444;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reset-picks-btn:hover { background: rgba(239,68,68,0.08); }

    /* scrollbar */
    .result-list::-webkit-scrollbar { width: 4px; }
    .result-list::-webkit-scrollbar-track { background: transparent; }
    .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">🎰</span>
      <h1>QandaCX<br/>Weekly Roulette</h1>
      <span class="sub">공정한 팀 선발 룰렛</span>
    </div>
    <div class="login-form">
      <label for="nameInput">이름을 입력하세요</label>
      <input
        id="nameInput"
        class="login-input"
        type="text"
        placeholder="예: Harry, Owen, Lucy..."
        autocomplete="off"
        oninput="onNameInput(this.value)"
        onkeydown="if(event.key==='Enter') tryStart()"
      />
      <p class="login-hint" id="loginHint"></p>
    </div>
    <button class="start-btn" id="startBtn" disabled onclick="tryStart()">시작하기</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MAIN SCREEN
═══════════════════════════════════════ -->
<div id="screen-main" class="screen">

  <div class="topbar">
    <div class="topbar-title">🎰 Weekly Roulette</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="icon-btn" title="환경설정" onclick="goSettings()">⚙️</button>
    </div>
  </div>

  <div class="main-header">
    <h2>QandaCX Weekly Roulette</h2>
    <p>SPIN 버튼을 눌러 각 팀에서 한 명씩 뽑습니다</p>
  </div>

  <div class="teams" id="teams"></div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN !</button>

  <div class="history-panel">
    <div class="history-inner">
      <div class="panel-title">뽑기 기록</div>
      <ul class="result-list" id="resultList">
        <li style="color:#4b5563;">아직 뽑힌 인원이 없습니다.</li>
      </ul>
      <div class="history-actions">
        <button class="ghost-btn" onclick="confirmResetPicks()">기록 초기화</button>
      </div>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════
     SETTINGS SCREEN
═══════════════════════════════════════ -->
<div id="screen-settings" class="screen">

  <div class="topbar">
    <div class="topbar-title">⚙️ 환경설정</div>
    <div class="topbar-right">
      <button class="icon-btn" title="메인으로" onclick="goMain()">←</button>
    </div>
  </div>

  <div class="settings-header">
    <h2>환경설정</h2>
    <p>팀 멤버 이름을 수정하거나 뽑기 기록을 초기화할 수 있습니다</p>
  </div>

  <div class="settings-body" id="settingsBody"></div>

</div>

<script>
// ══════════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════════
const DEFAULT_TEAMS = {
  BizOps: ["Iris Gwon", "Harry Kim", "Joy Kang"],
  CA:     ["Owen Hong", "Tommy Lim", "Jane Lee"],
  CX:     ["Lucy Seo", "Sam Choi", "Rani Kim", "Luna Jo"],
};

const TEAM_COLORS = { BizOps: "#a78bfa", CA: "#38bdf8", CX: "#34d399" };

// ── State ──────────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem("roulette_state_v2");
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  const state = { teams: {}, history: [] };
  for (const [team, names] of Object.entries(DEFAULT_TEAMS)) {
    state.teams[team] = names.map(name => ({ name, picks: 0 }));
  }
  return state;
}

function saveState() {
  localStorage.setItem("roulette_state_v2", JSON.stringify(state));
}

let state = loadState();
let currentUser = localStorage.getItem("roulette_user") || "";

// ══════════════════════════════════════════════════════════
//  LOGIN
// ══════════════════════════════════════════════════════════
function allFirstNames() {
  return Object.values(state.teams)
    .flat()
    .map(m => m.name.split(" ")[0].toLowerCase());
}

function allFullNames() {
  return Object.values(state.teams)
    .flat()
    .map(m => m.name.toLowerCase());
}

function matchName(input) {
  const val = input.trim().toLowerCase();
  if (!val) return null;
  // Exact first-name match or prefix match of first name
  const allMembers = Object.values(state.teams).flat();
  return allMembers.find(m => {
    const first = m.name.split(" ")[0].toLowerCase();
    return first === val || m.name.toLowerCase() === val;
  }) || null;
}

function onNameInput(value) {
  const hint = document.getElementById("loginHint");
  const input = document.getElementById("nameInput");
  const btn = document.getElementById("startBtn");

  if (!value.trim()) {
    hint.textContent = "";
    hint.className = "login-hint";
    input.className = "login-input";
    btn.disabled = true;
    return;
  }

  const matched = matchName(value);
  if (matched) {
    hint.textContent = `✓ ${matched.name}님, 환영합니다!`;
    hint.className = "login-hint ok";
    input.className = "login-input valid";
    btn.disabled = false;
  } else {
    hint.textContent = "등록된 멤버의 이름을 입력해주세요.";
    hint.className = "login-hint err";
    input.className = "login-input invalid";
    btn.disabled = true;
  }
}

function tryStart() {
  const val = document.getElementById("nameInput").value;
  const matched = matchName(val);
  if (!matched) return;
  currentUser = matched.name;
  localStorage.setItem("roulette_user", currentUser);
  showScreen("main");
  renderMain();
  renderHistory();
}

// Pre-fill saved name
window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("roulette_user");
  if (saved) {
    const input = document.getElementById("nameInput");
    input.value = saved.split(" ")[0]; // pre-fill first name
    onNameInput(input.value);
  }
  renderMain();
  renderHistory();
});

// ══════════════════════════════════════════════════════════
//  SCREEN NAV
// ══════════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(`screen-${name}`).classList.add("active");
  if (name === "main") {
    document.getElementById("topbarUser").textContent = currentUser ? `👤 ${currentUser}` : "";
  }
  if (name === "settings") renderSettings();
}

function goSettings() { showScreen("settings"); }
function goMain()     { showScreen("main"); renderMain(); renderHistory(); }

// ══════════════════════════════════════════════════════════
//  MAIN ROULETTE
// ══════════════════════════════════════════════════════════
function renderMain() {
  const container = document.getElementById("teams");
  container.innerHTML = "";

  for (const teamKey of Object.keys(DEFAULT_TEAMS)) {
    const members = state.teams[teamKey];
    const card = document.createElement("div");
    card.className = "team-card";
    card.dataset.team = teamKey;
    card.id = `card-${teamKey}`;

    card.innerHTML = `
      <div class="team-name">${teamKey}</div>
      <div class="slot-window" id="slot-${teamKey}">
        <span class="slot-text" id="slot-text-${teamKey}">?</span>
      </div>
      <div class="member-list" id="list-${teamKey}"></div>
    `;

    const list = card.querySelector(`#list-${teamKey}`);
    members.forEach((m, i) => {
      const isMe = m.name === currentUser;
      const item = document.createElement("div");
      item.className = "member-item" + (isMe ? " is-me" : "");
      item.id = `member-${teamKey}-${i}`;
      item.innerHTML = `
        <span class="member-name-text">${m.name}</span>
        <span class="pick-badge" id="badge-${teamKey}-${i}">${m.picks}회</span>
      `;
      list.appendChild(item);
    });

    container.appendChild(card);
  }
}

// ── Fair selection ────────────────────────────────────────
function pickMember(teamKey) {
  const members = state.teams[teamKey];
  const minPicks = Math.min(...members.map(m => m.picks));
  const pool = members.filter(m => m.picks === minPicks);
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── Spin ──────────────────────────────────────────────────
let spinning = false;

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById("spinBtn").disabled = true;

  const teamKeys = Object.keys(DEFAULT_TEAMS);
  const chosen = {};

  // Clear previous
  document.querySelectorAll(".member-item").forEach(el => el.classList.remove("highlighted"));
  document.querySelectorAll(".team-card").forEach(el => el.classList.remove("done", "spinning"));
  teamKeys.forEach(k => {
    document.getElementById(`card-${k}`).classList.add("spinning");
    const st = document.getElementById(`slot-text-${k}`);
    st.className = "slot-text";
    st.textContent = "?";
  });

  const SPIN_MS = 2200;
  const TICK_MS = 80;

  teamKeys.forEach((teamKey, ti) => {
    chosen[teamKey] = pickMember(teamKey);
    const members = state.teams[teamKey];
    const slotText = document.getElementById(`slot-text-${teamKey}`);
    const iv = setInterval(() => {
      slotText.textContent = members[Math.floor(Math.random() * members.length)].name;
    }, TICK_MS);

    setTimeout(() => {
      clearInterval(iv);
      const picked = chosen[teamKey];
      slotText.textContent = picked.name;
      slotText.className = "slot-text result";

      const idx = state.teams[teamKey].indexOf(picked);
      document.getElementById(`member-${teamKey}-${idx}`).classList.add("highlighted");

      const card = document.getElementById(`card-${teamKey}`);
      card.classList.remove("spinning");
      card.classList.add("done");

      picked.picks++;
      document.getElementById(`badge-${teamKey}-${idx}`).textContent = `${picked.picks}회`;

      if (ti === teamKeys.length - 1) {
        saveState();
        addHistory(chosen);
        spinning = false;
        document.getElementById("spinBtn").disabled = false;
      }
    }, SPIN_MS + ti * 380);
  });
}

// ── History ───────────────────────────────────────────────
function addHistory(chosen) {
  const entry = {
    round: (state.history.length || 0) + 1,
    picks: Object.fromEntries(
      Object.entries(chosen).map(([t, m]) => [t, m.name])
    )
  };
  state.history.push(entry);
  saveState();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById("resultList");
  if (!state.history.length) {
    list.innerHTML = '<li style="color:#4b5563;">아직 뽑힌 인원이 없습니다.</li>';
    return;
  }
  list.innerHTML = [...state.history].reverse().map(e => `
    <li>
      <span class="round-label">#${e.round}</span>
      ${Object.entries(e.picks).map(([team, name]) => `
        <span class="result-chip">
          <span class="dot" style="background:${TEAM_COLORS[team]}"></span>
          <span style="color:${TEAM_COLORS[team]};font-size:0.72rem">${team}</span>&nbsp;${name}
        </span>
      `).join("")}
    </li>
  `).join("");
}

function confirmResetPicks() {
  if (!confirm("모든 뽑기 기록과 횟수를 초기화할까요?")) return;
  resetPicks();
}

function resetPicks() {
  for (const members of Object.values(state.teams)) members.forEach(m => m.picks = 0);
  state.history = [];
  saveState();
  renderMain();
  renderHistory();
  document.querySelectorAll(".slot-text").forEach(el => { el.className = "slot-text"; el.textContent = "?"; });
  document.querySelectorAll(".team-card").forEach(el => el.classList.remove("done","spinning"));
}

// ══════════════════════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════════════════════
function renderSettings() {
  const body = document.getElementById("settingsBody");
  body.innerHTML = "";

  for (const teamKey of Object.keys(DEFAULT_TEAMS)) {
    const members = state.teams[teamKey];
    const card = document.createElement("div");
    card.className = "settings-card";
    card.dataset.team = teamKey;

    const rows = members.map((m, i) => `
      <div class="settings-member-row">
        <input
          class="settings-member-input"
          value="${m.name}"
          oninput="updateName('${teamKey}', ${i}, this.value)"
        />
        <span class="pick-info">${m.picks}회 뽑힘</span>
      </div>
    `).join("");

    card.innerHTML = `
      <div class="settings-card-title">${teamKey}</div>
      ${rows}
    `;
    body.appendChild(card);
  }

  // Reset button
  const resetCard = document.createElement("div");
  resetCard.className = "settings-card";
  resetCard.innerHTML = `
    <div class="panel-title" style="margin-bottom:14px">뽑기 기록</div>
    <button class="reset-picks-btn" onclick="confirmResetPicks()">⚠️ 모든 뽑기 기록 및 횟수 초기화</button>
  `;
  body.appendChild(resetCard);
}

function updateName(teamKey, idx, value) {
  state.teams[teamKey][idx].name = value;
  saveState();
}
</script>
</body>
</html>
